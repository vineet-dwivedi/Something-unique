apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: knitdev-ingress
  labels:
    app.kubernetes.io/name: knitdev-ingress
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths: 
      - pathType: Prefix
        path: "/api/sandbox"
        backend:
          service:
            name: sandbox-service
            port: 
              number: 80


  - host: "*.preview.localhost"
    http:
     paths:
     - pathType: Prefix
       path: "/"
       backend:
         service:
           name: router-service
           port:
             number: 80


  - host: "*.agent.localhost"
    http:
     paths:
     - pathType: Prefix
       path: "/"
       backend:
         service:
           name: router-service
           port:
             number: 80